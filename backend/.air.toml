root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/credit-analyzer-api ./cmd/server"
entrypoint = "./tmp/credit-analyzer-api"
full_bin = "./tmp/credit-analyzer-api"
include_ext = ["go", "mod", "sum"]
exclude_dir = ["tmp", "vendor"]
exclude_file = []
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"
log = "air-build.log"

[log]
time = true

[misc]
clean_on_exit = true
